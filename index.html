<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0b10">
<title>Quartz Clock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alata&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* iOS safe-area insets, fall back to 0 on non-notch devices/browsers */
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
    --sal: env(safe-area-inset-left, 0px);
    --sar: env(safe-area-inset-right, 0px);
  }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-text-size-adjust: 100%;
    touch-action: manipulation;
    background: radial-gradient(ellipse at 40% 35%, #2a2d3e 0%, #14151f 55%, #0a0b10 100%);
  }
  #root {
    width: 100vw;
    /* dvh accounts for mobile Safari's dynamic toolbar; vh is the fallback */
    height: 100vh;
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .clock-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    gap: clamp(0.5rem, 2vh, 1.25rem);
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    padding: calc(0.75rem + var(--sat)) calc(0.75rem + var(--sar)) calc(0.75rem + var(--sab)) calc(0.75rem + var(--sal));
    box-sizing: border-box;
  }
  .clock-svg-box {
    position: relative;
    width: 60vmin;
    aspect-ratio: 1 / 1;
    filter: drop-shadow(0 24px 48px rgba(0,0,0,0.55));
    flex-shrink: 0;
  }
  .clock-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  .digital-display {
    position: relative;
    overflow: hidden;
    border-radius: 1rem;
    padding: clamp(0.75rem, 2.5vh, 1.25rem) clamp(0.75rem, 4vw, 2.5rem);
    width: fit-content;
    max-width: calc(100vw - 1.5rem - var(--sal) - var(--sar));
    box-sizing: border-box;
    flex-shrink: 0;
    background: linear-gradient(145deg, #0f1117 0%, #1a1d2e 100%);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .scanlines {
    pointer-events: none;
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, #fff 2px, #fff 3px);
  }
  .digital-inner {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
  }
  #timeStr {
    font-family: 'DM Mono', monospace;
    font-size: clamp(1.6rem, 6vmin, 6rem);
    letter-spacing: 0.1em;
    color: #34d399;
    text-shadow: 0 0 12px rgba(52,211,153,0.6), 0 0 24px rgba(52,211,153,0.25);
    font-variant-numeric: tabular-nums;
    line-height: 0.9;
    white-space: nowrap;
  }
  #dateStr {
    font-family: 'DM Mono', monospace;
    font-size: clamp(1.2rem, 4.4vmin, 4.4rem);
    letter-spacing: 0.1em;
    color: #6ee7b7;
    text-shadow: 0 0 8px rgba(110,231,183,0.4);
    opacity: 0.8;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div id="root">
  <div class="clock-wrap">
    <div class="clock-svg-box">
      <!-- Static layer: bezel, face, ticks — cached bitmap, no fonts, redrawn only on resize -->
      <canvas class="clock-canvas" id="staticCanvas"></canvas>
      <!-- Dynamic layer: everything that uses a Google Font (numbers, brand text)
           plus the hands and cap — redrawn every animation frame so text always
           picks up the correct font the instant it finishes loading -->
      <canvas class="clock-canvas" id="dynamicCanvas"></canvas>
    </div>

    <div class="digital-display">
      <div class="scanlines"></div>
      <div class="digital-inner">
        <div id="timeStr">00:00:00</div>
        <div id="dateStr">MON JAN 01</div>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  const BASE = 400;      // all drawing coordinates are authored in this 0-400 space
  const cx = 200, cy = 200, faceR = 168;

  const staticCanvas = document.getElementById("staticCanvas");
  const dynamicCanvas = document.getElementById("dynamicCanvas");
  const staticCtx = staticCanvas.getContext("2d");
  const dynamicCtx = dynamicCanvas.getContext("2d");

  let dpr = Math.max(window.devicePixelRatio || 1, 1);
  let S = 1; // scale factor = current rendered size / BASE

  // ── Canvas setup (DPR-aware, ctx.setTransform to avoid cumulative scaling) ──
  function configureCanvas(canvas, ctx, sizePx) {
    canvas.width = Math.round(sizePx * dpr);
    canvas.height = Math.round(sizePx * dpr);
    canvas.style.width = sizePx + "px";
    canvas.style.height = sizePx + "px";
    S = sizePx / BASE;
    // Map our 0-400 authored coordinate space directly onto device pixels.
    ctx.setTransform(dpr * S, 0, 0, dpr * S, 0, 0);
  }

  // ── Gradient builders (percentages converted from the original SVG's
  //    objectBoundingBox gradients into absolute BASE-space coordinates) ──
  function bezelOuterGrad(ctx) {
    const g = ctx.createRadialGradient(152.96, 141.2, 0, 152.96, 141.2, 294);
    g.addColorStop(0, "#5a5f6e");
    g.addColorStop(0.4, "#2e3140");
    g.addColorStop(1, "#181c28");
    return g;
  }
  function bezelRimGrad(ctx) {
    const g = ctx.createLinearGradient(82.4, 4, 317.6, 396);
    g.addColorStop(0, "rgba(136,142,160,0.7)");
    g.addColorStop(0.5, "rgba(34,37,58,0)");
    g.addColorStop(1, "rgba(136,142,160,0.4)");
    return g;
  }
  function faceGrad(ctx) {
    const g = ctx.createRadialGradient(173.12, 153.96, 0, 173.12, 153.96, 241.92);
    g.addColorStop(0, "#ffffff");
    g.addColorStop(0.8, "#f4f5f7");
    g.addColorStop(1, "#e8eaef");
    return g;
  }
  function handGrad(ctx, xStart, xEnd) {
    const g = ctx.createLinearGradient(xStart, 0, xEnd, 0);
    g.addColorStop(0, "#111827");
    g.addColorStop(0.45, "#374151");
    g.addColorStop(0.55, "#4b5563");
    g.addColorStop(1, "#111827");
    return g;
  }
  function jewelGrad(ctx) {
    const g = ctx.createRadialGradient(197.6, 196.8, 0, 197.6, 196.8, 11.2);
    g.addColorStop(0, "#9ca3af");
    g.addColorStop(0.6, "#4b5563");
    g.addColorStop(1, "#111827");
    return g;
  }
  function glareGrad(ctx) {
    const g = ctx.createRadialGradient(159.68, 132.8, 0, 159.68, 132.8, 184.8);
    g.addColorStop(0, "rgba(255,255,255,0.18)");
    g.addColorStop(1, "rgba(255,255,255,0)");
    return g;
  }
  function ringGlareGrad(ctx) {
    const g = ctx.createLinearGradient(62.8, 4, 337.2, 396);
    g.addColorStop(0, "rgba(255,255,255,0.22)");
    g.addColorStop(0.45, "rgba(255,255,255,0)");
    g.addColorStop(1, "rgba(255,255,255,0.08)");
    return g;
  }

  function strokeCircle(ctx, r, color, width) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.stroke();
  }

  // ── Static layer: bezel, face, ticks (no text, no per-frame cost) ──
  function drawStatic() {
    const ctx = staticCtx;
    ctx.clearRect(0, 0, BASE, BASE);

    // Bezel
    ctx.beginPath();
    ctx.arc(cx, cy, 196, 0, Math.PI * 2);
    ctx.fillStyle = bezelOuterGrad(ctx);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx, cy, 196, 0, Math.PI * 2);
    ctx.fillStyle = bezelRimGrad(ctx);
    ctx.fill();
    strokeCircle(ctx, 193, "#0d1020", 1.5);
    strokeCircle(ctx, 190, "rgba(74,80,102,0.5)", 0.5);
    strokeCircle(ctx, 176, "#0d1020", 1.5);
    strokeCircle(ctx, 173, "rgba(58,64,85,0.4)", 0.5);

    // Face
    ctx.beginPath();
    ctx.arc(cx, cy, 168, 0, Math.PI * 2);
    ctx.fillStyle = faceGrad(ctx);
    ctx.fill();
    strokeCircle(ctx, 168, "#c8cad4", 0.8);
    strokeCircle(ctx, 158, "#dde0e8", 0.5);

    // Ticks
    for (let i = 0; i < 60; i++) {
      const isQuarter = i % 15 === 0;
      const isHour = i % 5 === 0;
      const rad = (i * 6 - 90) * (Math.PI / 180);
      const outerR = faceR - 1;
      const innerR = outerR - 8;
      const x1 = cx + outerR * Math.cos(rad);
      const y1 = cy + outerR * Math.sin(rad);
      const x2 = cx + innerR * Math.cos(rad);
      const y2 = cy + innerR * Math.sin(rad);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.strokeStyle = isQuarter ? "#1c2340" : isHour ? "#2c3a5a" : "#9aa0b0";
      ctx.lineWidth = isQuarter ? 3.5 : isHour ? 2.2 : 1;
      ctx.lineCap = "round";
      ctx.stroke();
    }
  }

  // Draw text with manual letter-spacing (canvas has no native letter-spacing
  // support in older engines), centered on x.
  function fillTextSpaced(ctx, text, x, y, spacing) {
    const chars = text.split("");
    const widths = chars.map((c) => ctx.measureText(c).width);
    const total = widths.reduce((a, b) => a + b, 0) + spacing * (chars.length - 1);
    let px = x - total / 2;
    const prevAlign = ctx.textAlign;
    ctx.textAlign = "left";
    for (let i = 0; i < chars.length; i++) {
      ctx.fillText(chars[i], px, y);
      px += widths[i] + spacing;
    }
    ctx.textAlign = prevAlign;
  }

  function drawHandShape(ctx, deg, rectSpec, pathPoints, gradXStart, gradXEnd, withShadow) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate((deg * Math.PI) / 180);
    ctx.translate(-cx, -cy);

    if (withShadow) {
      ctx.shadowColor = "rgba(0,0,0,0.35)";
      ctx.shadowBlur = 2.5;
      ctx.shadowOffsetX = 1;
      ctx.shadowOffsetY = 3;
    }

    const grad = handGrad(ctx, gradXStart, gradXEnd);
    ctx.fillStyle = grad;

    // Rounded rect base
    const [rx0, ry0, rw, rh, rr] = rectSpec;
    ctx.beginPath();
    if (ctx.roundRect) {
      ctx.roundRect(rx0, ry0, rw, rh, rr);
    } else {
      ctx.rect(rx0, ry0, rw, rh);
    }
    ctx.fill();

    // Tapered pointer path
    ctx.beginPath();
    ctx.moveTo(pathPoints[0][0], pathPoints[0][1]);
    for (let i = 1; i < pathPoints.length; i++) {
      ctx.lineTo(pathPoints[i][0], pathPoints[i][1]);
    }
    ctx.closePath();
    ctx.fill();

    ctx.shadowColor = "transparent";
    ctx.shadowBlur = 0;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;
    ctx.restore();
  }

  function drawSecondHand(ctx, deg) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate((deg * Math.PI) / 180);
    ctx.translate(-cx, -cy);

    ctx.strokeStyle = "#dc2626";
    ctx.lineCap = "round";

    ctx.beginPath();
    ctx.moveTo(200, 230);
    ctx.lineTo(200, 202);
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(200, 227.5, 4.5, 0, Math.PI * 2);
    ctx.fillStyle = "#dc2626";
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(200, 198);
    ctx.lineTo(200, 44);
    ctx.lineWidth = 1.8;
    ctx.stroke();

    ctx.restore();
  }

  // ── Dynamic layer: numbers, brand text, hands, cap, glare ──
  // Everything here uses a Google Font or moves every frame, so it's redrawn
  // continuously — this also guarantees the numerals/labels self-correct to
  // the right font the moment it finishes loading, with no special-case logic.
  function drawDynamic(angles) {
    const ctx = dynamicCtx;
    ctx.clearRect(0, 0, BASE, BASE);

    // Numbers
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "#1c2340";
    ctx.font = "400 64px 'Alata', sans-serif";
    for (let n = 1; n <= 12; n++) {
      const angle = (n * 30 - 90) * (Math.PI / 180);
      const numR = faceR - 40;
      const x = cx + numR * Math.cos(angle);
      const y = cy + numR * Math.sin(angle);
      ctx.fillText(String(n), x, y);
    }

    // Brand labels
    ctx.textBaseline = "alphabetic";
    ctx.font = "400 12px 'DM Sans', sans-serif";
    ctx.fillStyle = "#6b7280";
    fillTextSpaced(ctx, "PRECISION", 200, 250, 5);
    ctx.fillStyle = "#9ca3af";
    fillTextSpaced(ctx, "QUARTZ", 200, 270, 4);

    // Hour hand
    drawHandShape(
      ctx,
      angles.hourDeg,
      [196, 200, 8, 14, 4],
      [
        [194, 202], [193.5, 160], [196.5, 122], [200, 98],
        [203.5, 122], [206.5, 160], [206, 202],
      ],
      196, 204,
      true
    );

    // Minute hand
    drawHandShape(
      ctx,
      angles.minDeg,
      [197, 200, 6, 16, 3],
      [
        [195.5, 202], [195, 135], [197.5, 85], [200, 62],
        [202.5, 85], [205, 135], [204.5, 202],
      ],
      197, 203,
      true
    );

    // Second hand (no drop-shadow, matching the original)
    drawSecondHand(ctx, angles.secDeg);

    // Center cap
    ctx.beginPath();
    ctx.arc(200, 200, 10, 0, Math.PI * 2);
    ctx.fillStyle = "#111827";
    ctx.fill();

    ctx.beginPath();
    ctx.arc(200, 200, 8, 0, Math.PI * 2);
    ctx.fillStyle = jewelGrad(ctx);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(200, 200, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = "#6b7280";
    ctx.fill();

    ctx.beginPath();
    ctx.arc(200, 200, 2, 0, Math.PI * 2);
    ctx.fillStyle = "#d1d5db";
    ctx.fill();

    ctx.beginPath();
    ctx.arc(200, 200, 1.2, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.7)";
    ctx.fill();

    // Glare (drawn last so it sits above the hands, matching the original stacking)
    ctx.beginPath();
    ctx.arc(200, 200, 168, 0, Math.PI * 2);
    ctx.fillStyle = glareGrad(ctx);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(200, 200, 196, 0, Math.PI * 2);
    ctx.fillStyle = ringGlareGrad(ctx);
    ctx.fill();
  }

  // ── Layout: size the canvases to fill whatever space the digital display leaves ──
  const wrapEl = document.querySelector(".clock-wrap");
  const svgBoxEl = document.querySelector(".clock-svg-box");
  const digitalEl = document.querySelector(".digital-display");

  function resizeClock() {
    const wrapRect = wrapEl.getBoundingClientRect();
    const wrapCs = getComputedStyle(wrapEl);
    const padTop = parseFloat(wrapCs.paddingTop) || 0;
    const padBottom = parseFloat(wrapCs.paddingBottom) || 0;
    const padLeft = parseFloat(wrapCs.paddingLeft) || 0;
    const padRight = parseFloat(wrapCs.paddingRight) || 0;
    const gap = parseFloat(wrapCs.rowGap || wrapCs.gap) || 0;

    const availableWidth = wrapRect.width - padLeft - padRight;
    const digitalHeight = digitalEl.getBoundingClientRect().height;
    const availableHeightForClock =
      wrapRect.height - padTop - padBottom - gap - digitalHeight;

    let size = Math.min(availableWidth, availableHeightForClock);
    size = Math.max(size, 80); // sane floor so it never collapses to 0

    svgBoxEl.style.width = size + "px";
    svgBoxEl.style.height = size + "px";

    dpr = Math.max(window.devicePixelRatio || 1, 1);
    configureCanvas(staticCanvas, staticCtx, size);
    configureCanvas(dynamicCanvas, dynamicCtx, size);
    drawStatic();
  }

  window.addEventListener("resize", resizeClock);
  window.addEventListener("orientationchange", resizeClock);
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(resizeClock);
  }
  resizeClock();
  // Re-measure shortly after load in case web fonts swap in late and change
  // the digital display's rendered height.
  setTimeout(resizeClock, 150);
  setTimeout(resizeClock, 500);

  // ── Hands + digital display animation ──
  const timeStrEl = document.getElementById("timeStr");
  const dateStrEl = document.getElementById("dateStr");
  let lastTimeStr = "";
  let lastDateStr = "";

  function normalizeForward(prevDeg, rawDeg) {
    const prevMod = ((prevDeg % 360) + 360) % 360;
    let delta = rawDeg - prevMod;
    if (delta < 0) delta += 360;
    return prevDeg + delta;
  }

  let prev = { secDeg: 0, minDeg: 0, hourDeg: 0 };
  let initialized = false;

  function tick() {
    const now = new Date();
    const h = now.getHours() % 12;
    const m = now.getMinutes();
    const s = now.getSeconds();
    const ms = now.getMilliseconds();
    const fracSec = s + ms / 1000;

    const rawSec = fracSec * 6;
    const rawMin = m * 6 + fracSec * 0.1;
    const rawHour = h * 30 + (m + fracSec / 60) * 0.5;

    let secDeg, minDeg, hourDeg;
    if (!initialized) {
      secDeg = rawSec;
      minDeg = rawMin;
      hourDeg = rawHour;
      initialized = true;
    } else {
      secDeg = normalizeForward(prev.secDeg, rawSec);
      minDeg = normalizeForward(prev.minDeg, rawMin);
      hourDeg = normalizeForward(prev.hourDeg, rawHour);
    }
    prev = { secDeg, minDeg, hourDeg };

    drawDynamic({ secDeg, minDeg, hourDeg });

    // Only touch the DOM when the displayed string actually changes
    // (once a second) instead of on every animation frame.
    const timeStr = now.toLocaleTimeString("en-US", { hour12: false });
    if (timeStr !== lastTimeStr) {
      timeStrEl.textContent = timeStr;
      lastTimeStr = timeStr;
    }
    const dateStr = now
      .toLocaleDateString("en-US", { weekday: "short", month: "short", day: "2-digit" })
      .toUpperCase();
    if (dateStr !== lastDateStr) {
      dateStrEl.textContent = dateStr;
      lastDateStr = dateStr;
    }

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
