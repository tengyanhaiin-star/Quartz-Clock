<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0b10">
<title>Quartz Clock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alata&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* iOS safe-area insets, fall back to 0 on non-notch devices/browsers */
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
    --sal: env(safe-area-inset-left, 0px);
    --sar: env(safe-area-inset-right, 0px);
  }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-text-size-adjust: 100%;
    touch-action: manipulation;
    background: radial-gradient(ellipse at 40% 35%, #2a2d3e 0%, #14151f 55%, #0a0b10 100%);
  }
  #root {
    width: 100vw;
    /* dvh accounts for mobile Safari's dynamic toolbar; vh is the fallback */
    height: 100vh;
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .clock-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    gap: clamp(0.5rem, 2vh, 1.25rem);
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    padding: calc(0.75rem + var(--sat)) calc(0.75rem + var(--sar)) calc(0.75rem + var(--sab)) calc(0.75rem + var(--sal));
    box-sizing: border-box;
  }
  .clock-svg-box {
    width: 60vmin;
    aspect-ratio: 1 / 1;
    filter: drop-shadow(0 24px 48px rgba(0,0,0,0.55));
    flex-shrink: 0;
  }
  .clock-svg-box svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .digital-display {
    position: relative;
    overflow: hidden;
    border-radius: 1rem;
    padding: clamp(0.75rem, 2.5vh, 1.25rem) clamp(0.75rem, 4vw, 2.5rem);
    width: fit-content;
    max-width: calc(100vw - 1.5rem - var(--sal) - var(--sar));
    box-sizing: border-box;
    flex-shrink: 0;
    background: linear-gradient(145deg, #0f1117 0%, #1a1d2e 100%);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .scanlines {
    pointer-events: none;
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, #fff 2px, #fff 3px);
  }
  .digital-inner {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
  }
  #timeStr {
    font-family: 'DM Mono', monospace;
    font-size: clamp(1.6rem, 6vmin, 6rem);
    letter-spacing: 0.1em;
    color: #34d399;
    text-shadow: 0 0 12px rgba(52,211,153,0.6), 0 0 24px rgba(52,211,153,0.25);
    font-variant-numeric: tabular-nums;
    line-height: 0.9;
    white-space: nowrap;
  }
  #dateStr {
    font-family: 'DM Mono', monospace;
    font-size: clamp(1.2rem, 4.4vmin, 4.4rem);
    letter-spacing: 0.1em;
    color: #6ee7b7;
    text-shadow: 0 0 8px rgba(110,231,183,0.4);
    opacity: 0.8;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div id="root">
  <div class="clock-wrap">
    <div class="clock-svg-box">
      <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bezelOuter" cx="38%" cy="35%" r="75%">
            <stop offset="0%" stop-color="#5a5f6e"/>
            <stop offset="40%" stop-color="#2e3140"/>
            <stop offset="100%" stop-color="#181c28"/>
          </radialGradient>
          <linearGradient id="bezelRim" x1="20%" y1="0%" x2="80%" y2="100%">
            <stop offset="0%" stop-color="#888ea0" stop-opacity="0.7"/>
            <stop offset="50%" stop-color="#22253a" stop-opacity="0"/>
            <stop offset="100%" stop-color="#888ea0" stop-opacity="0.4"/>
          </linearGradient>
          <radialGradient id="faceGrad" cx="42%" cy="36%" r="72%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="80%" stop-color="#f4f5f7"/>
            <stop offset="100%" stop-color="#e8eaef"/>
          </radialGradient>
          <linearGradient id="hourGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#111827"/>
            <stop offset="45%" stop-color="#374151"/>
            <stop offset="55%" stop-color="#4b5563"/>
            <stop offset="100%" stop-color="#111827"/>
          </linearGradient>
          <linearGradient id="minGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#111827"/>
            <stop offset="45%" stop-color="#374151"/>
            <stop offset="55%" stop-color="#4b5563"/>
            <stop offset="100%" stop-color="#111827"/>
          </linearGradient>
          <radialGradient id="jewel" cx="35%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#9ca3af"/>
            <stop offset="60%" stop-color="#4b5563"/>
            <stop offset="100%" stop-color="#111827"/>
          </radialGradient>
          <filter id="handDrop" x="-60%" y="-60%" width="220%" height="220%">
            <feDropShadow dx="1" dy="3" stdDeviation="2.5" flood-color="#000" flood-opacity="0.35"/>
          </filter>
          <radialGradient id="glare" cx="38%" cy="30%" r="55%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
          </radialGradient>
          <linearGradient id="ringGlare" x1="15%" y1="0%" x2="85%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
            <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08"/>
          </linearGradient>
        </defs>

        <!-- Bezel -->
        <circle cx="200" cy="200" r="196" fill="url(#bezelOuter)"/>
        <circle cx="200" cy="200" r="196" fill="url(#bezelRim)"/>
        <circle cx="200" cy="200" r="193" fill="none" stroke="#0d1020" stroke-width="1.5"/>
        <circle cx="200" cy="200" r="190" fill="none" stroke="#4a5066" stroke-width="0.5" stroke-opacity="0.5"/>
        <circle cx="200" cy="200" r="176" fill="none" stroke="#0d1020" stroke-width="1.5"/>
        <circle cx="200" cy="200" r="173" fill="none" stroke="#3a4055" stroke-width="0.5" stroke-opacity="0.4"/>

        <!-- Face -->
        <circle cx="200" cy="200" r="168" fill="url(#faceGrad)"/>
        <circle cx="200" cy="200" r="168" fill="none" stroke="#c8cad4" stroke-width="0.8"/>
        <circle cx="200" cy="200" r="158" fill="none" stroke="#dde0e8" stroke-width="0.5"/>

        <!-- Ticks -->
        <g id="ticks"></g>

        <!-- Numbers -->
        <g id="numbers"></g>

        <!-- Labels -->
        <text x="200" y="250" text-anchor="middle" fill="#6b7280" font-size="12" font-family="'DM Sans', sans-serif" font-weight="400" letter-spacing="5">PRECISION</text>
        <text x="200" y="270" text-anchor="middle" fill="#9ca3af" font-size="12" font-family="'DM Sans', sans-serif" font-weight="400" letter-spacing="4">QUARTZ</text>

        <!-- Hour hand -->
        <g id="hourHand" filter="url(#handDrop)" style="transform-origin: 200px 200px;">
          <rect x="196" y="200" width="8" height="14" rx="4" fill="url(#hourGrad)"/>
          <path d="M 194 202 L 193.5 160 L 196.5 122 L 200 98 L 203.5 122 L 206.5 160 L 206 202 Z" fill="url(#hourGrad)"/>
        </g>

        <!-- Minute hand -->
        <g id="minHand" filter="url(#handDrop)" style="transform-origin: 200px 200px;">
          <rect x="197" y="200" width="6" height="16" rx="3" fill="url(#minGrad)"/>
          <path d="M 195.5 202 L 195 135 L 197.5 85 L 200 62 L 202.5 85 L 205 135 L 204.5 202 Z" fill="url(#minGrad)"/>
        </g>

        <!-- Second hand -->
        <g id="secHand" style="transform-origin: 200px 200px;">
          <line x1="200" y1="230" x2="200" y2="202" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
          <circle cx="200" cy="227.5" r="4.5" fill="#dc2626"/>
          <line x1="200" y1="198" x2="200" y2="44" stroke="#dc2626" stroke-width="1.8" stroke-linecap="round"/>
        </g>

        <!-- Center cap -->
        <circle cx="200" cy="200" r="10" fill="#111827"/>
        <circle cx="200" cy="200" r="8" fill="url(#jewel)"/>
        <circle cx="200" cy="200" r="3.5" fill="#6b7280"/>
        <circle cx="200" cy="200" r="2" fill="#d1d5db"/>
        <circle cx="200" cy="200" r="1.2" fill="#ffffff" fill-opacity="0.7"/>

        <!-- Glare -->
        <circle cx="200" cy="200" r="168" fill="url(#glare)"/>
        <circle cx="200" cy="200" r="196" fill="url(#ringGlare)"/>
      </svg>
    </div>

    <div class="digital-display">
      <div class="scanlines"></div>
      <div class="digital-inner">
        <div id="timeStr">00:00:00</div>
        <div id="dateStr">MON JAN 01</div>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  const cx = 200, cy = 200, faceR = 168;
  const svgNS = "http://www.w3.org/2000/svg";

  // Build tick marks
  const ticksGroup = document.getElementById("ticks");
  for (let i = 0; i < 60; i++) {
    const isQuarter = i % 15 === 0;
    const isHour = i % 5 === 0;
    const rad = (i * 6 - 90) * (Math.PI / 180);
    const outerR = faceR - 1;
    const innerR = outerR - 8;
    const x1 = cx + outerR * Math.cos(rad);
    const y1 = cy + outerR * Math.sin(rad);
    const x2 = cx + innerR * Math.cos(rad);
    const y2 = cy + innerR * Math.sin(rad);
    const stroke = isQuarter ? "#1c2340" : isHour ? "#2c3a5a" : "#9aa0b0";
    const strokeWidth = isQuarter ? 3.5 : isHour ? 2.2 : 1;

    const line = document.createElementNS(svgNS, "line");
    line.setAttribute("x1", x1);
    line.setAttribute("y1", y1);
    line.setAttribute("x2", x2);
    line.setAttribute("y2", y2);
    line.setAttribute("stroke", stroke);
    line.setAttribute("stroke-width", strokeWidth);
    line.setAttribute("stroke-linecap", "round");
    ticksGroup.appendChild(line);
  }

  // Build numbers
  const numbersGroup = document.getElementById("numbers");
  for (let n = 1; n <= 12; n++) {
    const angle = (n * 30 - 90) * (Math.PI / 180);
    const numR = faceR - 40;
    const x = cx + numR * Math.cos(angle);
    const y = cy + numR * Math.sin(angle);

    const text = document.createElementNS(svgNS, "text");
    text.setAttribute("x", x);
    text.setAttribute("y", y);
    text.setAttribute("text-anchor", "middle");
    text.setAttribute("dominant-baseline", "central");
    text.setAttribute("fill", "#1c2340");
    text.setAttribute("font-size", "64");
    text.setAttribute("font-family", "'Alata', sans-serif");
    text.setAttribute("font-weight", "400");
    text.textContent = n;
    numbersGroup.appendChild(text);
  }

  // Hands + digital display
  const hourHand = document.getElementById("hourHand");
  const minHand = document.getElementById("minHand");
  const secHand = document.getElementById("secHand");
  const timeStrEl = document.getElementById("timeStr");
  const dateStrEl = document.getElementById("dateStr");

  // ── Dynamic layout ──
  // Measures the actual rendered height of the digital display (whose height
  // depends on font metrics we don't want to hand-guess in CSS), then sizes
  // the analog clock to fill exactly whatever space is left. This keeps the
  // digital box from ever being flex-shrunk shorter than its own text.
  const wrapEl = document.querySelector(".clock-wrap");
  const svgBoxEl = document.querySelector(".clock-svg-box");
  const digitalEl = document.querySelector(".digital-display");

  function resizeClock() {
    const wrapRect = wrapEl.getBoundingClientRect();
    const wrapCs = getComputedStyle(wrapEl);
    const padTop = parseFloat(wrapCs.paddingTop) || 0;
    const padBottom = parseFloat(wrapCs.paddingBottom) || 0;
    const padLeft = parseFloat(wrapCs.paddingLeft) || 0;
    const padRight = parseFloat(wrapCs.paddingRight) || 0;
    const gap = parseFloat(wrapCs.rowGap || wrapCs.gap) || 0;

    const availableWidth = wrapRect.width - padLeft - padRight;
    const digitalHeight = digitalEl.getBoundingClientRect().height;
    const availableHeightForClock =
      wrapRect.height - padTop - padBottom - gap - digitalHeight;

    let size = Math.min(availableWidth, availableHeightForClock);
    size = Math.max(size, 80); // sane floor so it never collapses to 0
    svgBoxEl.style.width = size + "px";
    svgBoxEl.style.height = size + "px";
  }

  window.addEventListener("resize", resizeClock);
  window.addEventListener("orientationchange", resizeClock);
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(resizeClock);
  }
  resizeClock();
  // Re-measure shortly after load in case web fonts swap in late and change
  // the digital display's rendered height.
  setTimeout(resizeClock, 150);
  setTimeout(resizeClock, 500);

  function normalizeForward(prevDeg, rawDeg) {
    const prevMod = ((prevDeg % 360) + 360) % 360;
    let delta = rawDeg - prevMod;
    if (delta < 0) delta += 360;
    return prevDeg + delta;
  }

  let prev = { secDeg: 0, minDeg: 0, hourDeg: 0 };
  let initialized = false;

  function tick() {
    const now = new Date();
    const h = now.getHours() % 12;
    const m = now.getMinutes();
    const s = now.getSeconds();
    const ms = now.getMilliseconds();
    const fracSec = s + ms / 1000;

    const rawSec = fracSec * 6;
    const rawMin = m * 6 + fracSec * 0.1;
    const rawHour = h * 30 + (m + fracSec / 60) * 0.5;

    let secDeg, minDeg, hourDeg;
    if (!initialized) {
      secDeg = rawSec;
      minDeg = rawMin;
      hourDeg = rawHour;
      initialized = true;
    } else {
      secDeg = normalizeForward(prev.secDeg, rawSec);
      minDeg = normalizeForward(prev.minDeg, rawMin);
      hourDeg = normalizeForward(prev.hourDeg, rawHour);
    }
    prev = { secDeg, minDeg, hourDeg };

    hourHand.style.transform = `rotate(${hourDeg}deg)`;
    minHand.style.transform = `rotate(${minDeg}deg)`;
    secHand.style.transform = `rotate(${secDeg}deg)`;

    const timeStr = now.toLocaleTimeString("en-US", { hour12: false });
    const dateStr = now.toLocaleDateString("en-US", {
      weekday: "short",
      month: "short",
      day: "2-digit",
    });
    timeStrEl.textContent = timeStr;
    dateStrEl.textContent = dateStr.toUpperCase();

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
