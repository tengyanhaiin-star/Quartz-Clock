<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>HALFTONE THUNDER TIMEPIECE</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Permanent+Marker&family=Boogaloo&family=LXGW+WenKai+Mono+TC:wght@700&family=Rancho&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #FFE632;
    --orange: #FF8214;
    --red: #DC1E1E;
    --cobalt: #1440B4;
    --cobalt-light: #3C6EDC;
    --cream: #FFF5C8;
    --black: #0A0A0A;
    --white: #FFFFFF;
    --shadow: #1E1E1E;
  }

  html {
    height: -webkit-fill-available;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--yellow);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Bangers', cursive;
    overflow: hidden;
    position: relative;
  }

  /* Halftone dot background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, rgba(0,0,0,0.12) 1.5px, transparent 1.5px);
    background-size: 18px 18px;
    pointer-events: none;
    z-index: 0;
  }

  /* Starburst — fixed behind everything, perfectly centered in viewport */
  /* rotation is driven by JS in the rAF loop, no CSS animation */
  .starburst {
    position: fixed;
    width: 130vmin; height: 130vmin;
    top: 50%; left: 50%;
    z-index: 0;
    pointer-events: none;
  }

  /* spin-burst keyframes removed — JS controls transform */

  /* Clock shell — scales with screen, canvas stays 480px internally */
  .clock-shell {
    position: fixed;
    width: 480px; height: 480px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(var(--clock-scale, 1));
    transform-origin: center center;
    z-index: 2;
  }

  /* Outer thick border ring */
  .clock-shell::before {
    content: '';
    position: absolute; inset: -14px;
    border-radius: 50%;
    background: var(--black);
    z-index: -1;
    filter: drop-shadow(8px 8px 0 rgba(0,0,0,0.5));
  }

  /* Ben-Day dot ring */
  .clock-shell::after {
    content: '';
    position: absolute; inset: -10px;
    border-radius: 50%;
    background:
      radial-gradient(circle, var(--cobalt-light) 2px, transparent 2px) 0 0 / 12px 12px,
      var(--cobalt);
    z-index: -1;
    opacity: 0.8;
  }

  canvas#clockCanvas {
    width: 100%; height: 100%;
    display: block;
    border-radius: 50%;
  }

  /* TICK label — above the clock, responsive */
  .tick-label {
    position: fixed;
    left: 50%;
    bottom: calc(50vh + var(--clock-r, 240px) + 4vmin);
    transform: translateX(-50%);
    font-family: 'Bangers', cursive;
    font-size: clamp(32px, 10vmin, 72px);
    letter-spacing: 4px;
    color: var(--white);
    background: var(--cobalt);
    padding: 2px 5vmin 4px;
    border: clamp(3px, 0.8vmin, 6px) solid var(--black);
    border-radius: 14px;
    box-shadow: clamp(3px, 1vmin, 7px) clamp(3px, 1vmin, 7px) 0 var(--black);
    z-index: 3;
    user-select: none;
    white-space: nowrap;
  }

  /* Digital time strip — below the clock, responsive */
  .digital-strip {
    position: fixed;
    left: 50%;
    top: calc(50vh + var(--clock-r, 240px) + 4vmin);
    transform: translateX(-50%);
    font-family: 'LXGW WenKai Mono TC', monospace;
    font-weight: 700;
    font-size: clamp(16px, 4.5vmin, 28px);
    letter-spacing: 4px;
    color: var(--black);
    background: var(--cream);
    border: clamp(2px, 0.6vmin, 4px) solid var(--black);
    padding: 2px 4vmin 4px;
    border-radius: 8px;
    box-shadow: clamp(2px, 0.8vmin, 5px) clamp(2px, 0.8vmin, 5px) 0 var(--black);
    z-index: 3;
    white-space: nowrap;
  }

  /* Corner rivets */
  .rivets {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 10;
  }
  .rivet {
    position: absolute;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--red);
    border: 4px solid var(--black);
    box-shadow: 3px 3px 0 var(--black);
  }
  .rivet.tl { top: 22px; left: 22px; }
  .rivet.tr { top: 22px; right: 22px; }
  .rivet.bl { bottom: 22px; left: 22px; }
  .rivet.br { bottom: 22px; right: 22px; }

  /* Outer page border — respects iPhone safe area */
  .page-border {
    position: fixed;
    top: max(10px, env(safe-area-inset-top, 10px));
    bottom: max(10px, env(safe-area-inset-bottom, 10px));
    left: max(10px, env(safe-area-inset-left, 10px));
    right: max(10px, env(safe-area-inset-right, 10px));
    border: 10px solid var(--black);
    pointer-events: none;
    z-index: 9;
  }
  .page-border::after {
    content: '';
    position: absolute; inset: 5px;
    border: 3px solid var(--black);
  }

  /* Speed lines left */
  .speed-lines {
    position: fixed;
    left: 3vmin; top: 50%;
    transform: translateY(-50%);
    display: flex; flex-direction: column; gap: clamp(8px, 2vmin, 18px);
    z-index: 2;
  }
  .speed-line {
    height: clamp(3px, 0.8vmin, 5px);
    background: var(--black);
    border-radius: 3px;
    transform-origin: right center;
  }
  .speed-line:nth-child(1) { width: clamp(30px, 8vmin, 60px); }
  .speed-line:nth-child(2) { width: clamp(45px, 12vmin, 90px); }
  .speed-line:nth-child(3) { width: clamp(35px, 9vmin, 70px); }
  .speed-line:nth-child(4) { width: clamp(25px, 7vmin, 50px); }
  .speed-line:nth-child(5) { width: clamp(40px, 10vmin, 80px); }

  /* Subtitle — must stay inside the black border (inset 10px + border 10px = 20px from edge) */
  .subtitle {
    position: fixed;
    bottom: max(28px, calc(20px + env(safe-area-inset-bottom, 0px)));
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Bangers', cursive;
    font-size: clamp(10px, 2.2vmin, 16px);
    letter-spacing: clamp(3px, 1vmin, 6px);
    color: rgba(0,0,0,0.4);
    z-index: 5;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="page-border"></div>
<div class="rivets">
  <div class="rivet tl"></div>
  <div class="rivet tr"></div>
  <div class="rivet bl"></div>
  <div class="rivet br"></div>
</div>

<div class="speed-lines">
  <div class="speed-line"></div>
  <div class="speed-line"></div>
  <div class="speed-line"></div>
  <div class="speed-line"></div>
  <div class="speed-line"></div>
</div>

<!-- SVG starburst: fixed, centered -->
<svg class="starburst" viewBox="0 0 620 620" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(310,310)"></g>
</svg>

<!-- Clock: fixed, centered -->
<div class="clock-shell">
  <canvas id="clockCanvas" width="480" height="480"></canvas>
</div>

<!-- TICK above clock -->
<div class="tick-label" id="tickLabel">TICK!</div>

<!-- Digital time below clock -->
<div class="digital-strip" id="digitalTime">00:00:00</div>

<div class="subtitle">HALFTONE THUNDER TIMEPIECE · EST. NOW</div>

<script>
// ── Starburst SVG (built via JS for crispness) ───────────────────────────
(function buildBurst() {
  const svg = document.querySelector('.starburst');
  const g = svg.querySelector('g');
  const n = 30;  // 30 rays = 12° each; sec hand aligns every 2s
  for (let i = 0; i < n; i++) {
    const a1 = (2*Math.PI * i / n) * 180/Math.PI;
    const a2 = (2*Math.PI * (i+0.5) / n) * 180/Math.PI;
    const aM = (a1+a2)/2;
    const R = 305, Rm = 265;  // original shape proportions
    const toXY = (deg, r) => [r*Math.cos(deg*Math.PI/180), r*Math.sin(deg*Math.PI/180)];
    const [x1,y1] = toXY(a1, R);
    const [xm,ym] = toXY(aM, Rm);
    const [x2,y2] = toXY(a2, R);
    const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    poly.setAttribute('points', `0,0 ${x1},${y1} ${xm},${ym} ${x2},${y2}`);
    poly.setAttribute('fill', i%2===0 ? '#FF8214' : '#FFE632');
    poly.setAttribute('stroke', '#0A0A0A');
    poly.setAttribute('stroke-width', '1.5');
    g.appendChild(poly);
  }
})();

// ── Canvas clock ─────────────────────────────────────────────────────────
const canvas = document.getElementById('clockCanvas');
const ctx    = canvas.getContext('2d');
const W = 480, H = 480, cx = W/2, cy = H/2;

const C = {
  yellow:  '#FFE632', orange:  '#FF8214', red:  '#DC1E1E',
  cobalt:  '#1440B4', cobaltL: '#3C6EDC', cream: '#FFF5C8',
  black:   '#0A0A0A', white:   '#FFFFFF', shadow: 'rgba(0,0,0,0.45)'
};

// Preload Bangers via canvas
const fontReady = Promise.all([
  document.fonts.load('76px Rancho'),
  document.fonts.load('60px Bangers'),
]);

function deg2rad(d) { return (d - 90) * Math.PI/180; }

function drawDotField(cx2, cy2, rOut, rIn, dotR, spacing, color) {
  ctx.fillStyle = color;
  for (let dy = -rOut; dy <= rOut; dy += spacing) {
    for (let dx = -rOut; dx <= rOut; dx += spacing) {
      const d = Math.sqrt(dx*dx+dy*dy);
      if (d >= rIn && d <= rOut) {
        ctx.beginPath();
        ctx.arc(cx2+dx, cy2+dy, dotR, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }
}

function drawHand(angle, length, width, fillColor) {
  const a   = deg2rad(angle);
  const tx  = cx + length * Math.cos(a);
  const ty  = cy + length * Math.sin(a);
  const pa  = a + Math.PI/2;
  const hw  = width/2;
  const tip = width * 0.25;

  const pts = [
    [cx + hw*Math.cos(pa),  cy + hw*Math.sin(pa)],
    [tx + tip*Math.cos(pa), ty + tip*Math.sin(pa)],
    [tx - tip*Math.cos(pa), ty - tip*Math.sin(pa)],
    [cx - hw*Math.cos(pa),  cy - hw*Math.sin(pa)],
  ];

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  pts.forEach(([x,y],i) => i===0 ? ctx.moveTo(x+7,y+7) : ctx.lineTo(x+7,y+7));
  ctx.closePath(); ctx.fill();

  // Body
  ctx.fillStyle = fillColor;
  ctx.beginPath();
  pts.forEach(([x,y],i) => i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y));
  ctx.closePath(); ctx.fill();

  // Outline
  ctx.strokeStyle = C.black; ctx.lineWidth = 4;
  ctx.beginPath();
  pts.forEach(([x,y],i) => i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y));
  ctx.closePath(); ctx.stroke();
}

function roundRect(x, y, w, h, r, fill, stroke, sw) {
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = sw||4; ctx.stroke(); }
}

let lastSec = -1;
const speedLines = document.querySelectorAll('.speed-line');
const starburst  = document.querySelector('.starburst');
const tickLabel  = document.getElementById('tickLabel');
// phase offsets for each speed line (staggered within the 1s cycle)
const linePhase  = [0, 0.1, 0.2, 0.3, 0.15];

function draw() {
  const now  = new Date();
  const hrs  = now.getHours() % 12;
  const mins = now.getMinutes();
  const secs = now.getSeconds();
  const ms   = now.getMilliseconds();

  // ── Smooth second progress 0→1 within current second ──
  const secFrac = secs + ms / 1000;   // 0..59.999

  // 1. Starburst: 60s = full rotation, aligned with second hand
  //    secAngle uses same formula as second hand below
  const burstDeg = secFrac * 6 - 93;
  starburst.style.transform = `translate(-50%, -50%) rotate(${burstDeg}deg)`;

  // 2. Speed lines: 1s cycle, 0→1 sawtooth, each line has a phase offset
  //    Use a smooth sine-based pulse: 0 at start of second, peak at 0.5, back to 0
  const cyclePos = (ms / 1000);       // 0→1 within current second
  speedLines.forEach((line, i) => {
    const t = ((cyclePos + linePhase[i]) % 1);
    // sine curve: goes 0→1→0 over one second
    const wave = Math.sin(t * Math.PI);
    const scale = 0.6 + 0.4 * wave;
    const opacity = 0.5 + 0.5 * wave;
    line.style.transform = `scaleX(${scale})`;
    line.style.opacity = opacity;
  });

  // 3. TICK/TOCK: odd secs = TICK!, even secs = TOCK!, pop on beat
  //    Pop scale: sharp attack at ms=0, decay over 300ms
  const popDecay = Math.max(0, 1 - ms / 300);
  const popScale = 1 + 0.08 * popDecay;
  const isTick = secs % 2 === 1;
  if (secs !== lastSec) {
    lastSec = secs;
    tickLabel.textContent = isTick ? 'TICK!' : 'TOCK!';
    tickLabel.style.color = isTick ? 'var(--white)' : 'var(--yellow)';
  }
  tickLabel.style.transform = `translateX(-50%) scale(${popScale})`;

  // Digital time
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('digitalTime').textContent =
    `${pad(now.getHours())}:${pad(mins)}:${pad(secs)}`;

  // ── Canvas clock ──
  const secAngle  = secFrac * 6;
  const minAngle  = mins*6 + secs*0.1;
  const hourAngle = hrs*30 + mins*0.5;

  ctx.clearRect(0, 0, W, H);

  // ── Ben-Day dot field (outer) ──
  drawDotField(cx, cy, 225, 202, 3.5, 13, C.cobaltL + '55');

  // ── Face shadow ──
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.arc(cx+9, cy+9, 240, 0, Math.PI*2); ctx.fill();

  // ── Face ──
  ctx.fillStyle = C.cream;
  ctx.beginPath(); ctx.arc(cx, cy, 240, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = C.black; ctx.lineWidth = 11;
  ctx.beginPath(); ctx.arc(cx, cy, 240, 0, Math.PI*2); ctx.stroke();

  // Inner rings
  ctx.strokeStyle = C.black; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(cx, cy, 224, 0, Math.PI*2); ctx.stroke();
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(cx, cy, 210, 0, Math.PI*2); ctx.stroke();

  // ── Subtle halftone on face ──
  drawDotField(cx+40, cy+40, 160, 0, 2, 10, 'rgba(180,165,110,0.22)');

  // ── Tick marks + numbers ──
  for (let h = 1; h <= 12; h++) {
    const a = deg2rad(h*30);
    const isCard = h%3===0;
    const rOut = isCard ? 223 : 224, rIn = isCard ? 211 : 210;
    ctx.strokeStyle = C.black;
    ctx.lineWidth = isCard ? 5 : 2.5;
    ctx.beginPath();
    ctx.moveTo(cx + rOut*Math.cos(a), cy + rOut*Math.sin(a));
    ctx.lineTo(cx + rIn*Math.cos(a),  cy + rIn*Math.sin(a));
    ctx.stroke();

    // Number labels
    const nr = isCard ? 168 : 174;
    const nx = cx + nr*Math.cos(a);
    const ny = cy + nr*Math.sin(a);

    if (isCard) {
      const txt = String(h);
      ctx.font = '400 76px Rancho';
      const tw = ctx.measureText(txt).width;
      const pad = 9, th = 52;
      // badge shadow
      roundRect(nx-tw/2-pad+5, ny-th/2-pad+5, tw+pad*2, th+pad*2, 8,
                'rgba(0,0,0,0.4)', null);
      // badge
      roundRect(nx-tw/2-pad, ny-th/2-pad, tw+pad*2, th+pad*2, 8, C.red, C.black, 4);
      ctx.fillStyle = C.white;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(txt, nx, ny+2);
    } else {
      ctx.font = '400 76px Rancho';
      ctx.fillStyle = C.black;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(String(h), nx, ny+1);
    }
  }

  // Minute ring dots at r=217, between the two inner rings
  for (let m = 0; m < 60; m++) {
    if (m%5===0) continue;
    const a = deg2rad(m*6);
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.arc(cx+217*Math.cos(a), cy+217*Math.sin(a), 2.5, 0, Math.PI*2);
    ctx.fill();
  }

  // ── Hands ──
  drawHand(hourAngle,  140, 18, C.black);
  drawHand(minAngle,   174, 13, C.cobalt);

  // Second hand (thin, with tail)
  const sa = deg2rad(secAngle);
  // tail
  ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx - 48*Math.cos(sa)+5, cy - 48*Math.sin(sa)+5);
  ctx.lineTo(cx + 192*Math.cos(sa)+5, cy + 192*Math.sin(sa)+5);
  ctx.stroke();
  ctx.strokeStyle = C.red; ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(cx - 48*Math.cos(sa), cy - 48*Math.sin(sa));
  ctx.lineTo(cx + 192*Math.cos(sa), cy + 192*Math.sin(sa));
  ctx.stroke();

  // ── Center cap ──
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.arc(cx+5, cy+5, 17, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = C.red;
  ctx.beginPath(); ctx.arc(cx, cy, 17, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = C.black; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(cx, cy, 17, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle = C.white;
  ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI*2); ctx.fill();
}

// ── Responsive scale ─────────────────────────────────────────────────────
const clockShell = document.querySelector('.clock-shell');

function updateScale() {
  // Target: clock diameter = 80vmin, max 480px
  const vmin = Math.min(window.innerWidth, window.innerHeight);
  const target = Math.min(vmin * 0.80, 480);
  const scale  = target / 480;
  const clockR = 240 * scale;   // scaled radius in px
  document.documentElement.style.setProperty('--clock-scale', scale);
  document.documentElement.style.setProperty('--clock-r', clockR + 'px');
}

updateScale();
window.addEventListener('resize', updateScale);
// iOS fires resize on scroll (toolbar show/hide) — also listen to orientationchange
window.addEventListener('orientationchange', () => setTimeout(updateScale, 200));

function loop() {
  draw();
  requestAnimationFrame(loop);
}

// Disable pinch-zoom on iOS (double-safety alongside viewport meta)
document.addEventListener('touchstart', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
document.addEventListener('touchmove',  e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });

fontReady.then(loop).catch(loop);
</script>
</body>
</html>
